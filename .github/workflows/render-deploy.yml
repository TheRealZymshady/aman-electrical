name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Render CLI
        run: |
          curl -L https://github.com/render-oss/cli/releases/download/v2.21.0/cli_2.21.0_linux_amd64.zip -o render.zip
          unzip render.zip
          sudo mv cli_v2.21.0 /usr/local/bin/render

      - name: Trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Add RENDER_API_KEY and RENDER_SERVICE_ID to GitHub repo secrets to enable auto-deploy."
            exit 0
          fi
          render deploys create "$RENDER_SERVICE_ID" --output json --confirm
