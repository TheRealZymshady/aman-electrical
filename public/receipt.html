<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Receipt — Aman Electrical</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .receipt-page { max-width: 480px; margin: 48px auto; padding: 0 20px; }
    .receipt-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow-sm);
    }
    .receipt-card h1 {
      font-family: var(--font-display);
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .receipt-card p { color: var(--steel); font-size: 14px; margin-bottom: 20px; }
    .receipt-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo"><img src="/logo.png" alt="Aman Electrical" onerror="this.style.display='none'"></a>
      <nav class="nav-links" id="navLinks">
        <a href="/" data-i18n="nav.home">Home</a>
        <a href="/#book" data-i18n="nav.book">Book a repair</a>
      </nav>
    </div>
  </header>

  <main class="receipt-page">
    <div class="receipt-card">
      <h1 data-i18n="receipt.title">Download your receipt</h1>
      <p data-i18n="receipt.hint">Enter your work order number and the last 4 digits of your phone to view and print your official service receipt.</p>
      <div id="receiptError" class="receipt-error"></div>
      <form id="receiptForm">
        <div class="form-group">
          <label for="receiptTicket" data-i18n="status.ticketLabel">Work order #</label>
          <input type="text" id="receiptTicket" placeholder="FX-1234" required>
        </div>
        <div class="form-group">
          <label for="receiptPhone" data-i18n="status.phoneLabel">Phone (last 4 digits)</label>
          <input type="text" id="receiptPhone" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="6789" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="receiptBtn" data-i18n="receipt.view">View receipt</button>
      </form>
    </div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/receipt.js"></script>
</body>
</html>
